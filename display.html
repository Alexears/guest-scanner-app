<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экран</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f1115;
      font-family: Arial, sans-serif;
      color: #9ca3af;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .placeholder {
      font-size: 1.3rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <img id="image" style="display:none;" alt="Карточка гостя">
  <div id="placeholder" class="placeholder">Ожидание карточки…</div>

  <script>
    var image = document.getElementById('image');
    var placeholder = document.getElementById('placeholder');
    var lastCode = null;

    function pollState() {
      fetch('/api/state?t=' + Date.now(), { cache: 'no-store' })
        .then(function (res) { return res.json(); })
        .then(function (state) {
          if (state.selected_guest_code && state.selected_guest_code !== lastCode) {
            lastCode = state.selected_guest_code;
            image.src = lastCode + '.jpg';
            image.style.display = 'block';
            placeholder.style.display = 'none';
          }
        })
        .catch(function (err) {
          console.error(err);
        });
    }

    pollState();
    setInterval(pollState, 700);
  </script>
</body>
</html>
