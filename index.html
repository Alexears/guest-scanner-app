<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер браслетов</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f1115;
      color: #f3f4f6;
    }
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }
    h1 {
      font-size: 2rem;
      margin: 0 0 20px;
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      padding: 14px 22px;
      font-size: 1.05rem;
      cursor: pointer;
      border-radius: 12px;
      border: 1px solid #2b313b;
      background: #1a1f27;
      color: #f3f4f6;
    }
    button:hover { background: #222834; }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    #reader {
      display: none;
      margin-top: 18px;
      max-width: 440px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2b313b;
      background: #151922;
      padding: 10px;
    }
    #preview {
      margin-top: 18px;
      max-width: 440px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #2b313b;
      background: #151922;
    }
    #preview img {
      max-width: 100%;
      border: 1px solid #2b313b;
      border-radius: 12px;
      display: block;
    }
    .error {
      margin-top: 16px;
      color: #ff8a8a;
      font-size: 1rem;
      line-height: 1.4;
    }
    .ok {
      margin-top: 14px;
      color: #7ee787;
      line-height: 1.4;
    }
    .muted {
      margin-top: 8px;
      color: #9ca3af;
      line-height: 1.4;
    }
    .camera-badge {
      margin-top: 10px;
      color: #9ca3af;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Сканер браслетов</h1>

    <div class="controls">
      <button id="scan-btn">Сканировать</button>
      <button id="switch-btn" style="display:none;">Сменить камеру</button>
    </div>

    <div id="reader"></div>
    <div id="camera-info" class="camera-badge"></div>
    <div id="status"></div>
    <div id="preview"></div>
  </div>

  <script>
    var scanBtn = document.getElementById('scan-btn');
    var switchBtn = document.getElementById('switch-btn');
    var readerEl = document.getElementById('reader');
    var statusEl = document.getElementById('status');
    var previewEl = document.getElementById('preview');
    var cameraInfoEl = document.getElementById('camera-info');

    var html5QrCode = null;
    var permissionAsked = false;
    var cameras = [];
    var currentCameraIndex = 0;
    var isScannerRunning = false;

    scanBtn.addEventListener('click', function () {
      statusEl.innerHTML = '';
      previewEl.innerHTML = '';

      if (typeof Html5Qrcode === 'undefined') {
        showError(new Error('Библиотека сканера не загрузилась. Проверьте интернет и откройте страницу в Chrome.'));
        return;
      }

      requestPermissionAndStart();
    });

    switchBtn.addEventListener('click', function () {
      if (!cameras.length || !html5QrCode || !isScannerRunning) return;

      switchBtn.disabled = true;
      html5QrCode.stop()
        .then(function () {
          isScannerRunning = false;
          currentCameraIndex = (currentCameraIndex + 1) % cameras.length;
          startWithCurrentCamera();
        })
        .catch(function (error) {
          switchBtn.disabled = false;
          showError(error);
        });
    });

    function requestPermissionAndStart() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError(new Error('Браузер не поддерживает доступ к камере.'));
        return;
      }

      if (permissionAsked) {
        loadCamerasAndStart();
        return;
      }

      navigator.mediaDevices.getUserMedia({ video: true, audio: false })
        .then(function (stream) {
          permissionAsked = true;
          var tracks = stream.getTracks();
          for (var i = 0; i < tracks.length; i++) {
            tracks[i].stop();
          }
          loadCamerasAndStart();
        })
        .catch(function (error) {
          showError(error);
        });
    }

    function loadCamerasAndStart() {
      Html5Qrcode.getCameras()
        .then(function (availableCameras) {
          if (!availableCameras || availableCameras.length === 0) {
            throw new Error('Браузер не нашёл ни одной камеры.');
          }

          cameras = availableCameras;
          currentCameraIndex = pickPreferredCameraIndex(cameras);

          if (!html5QrCode) {
            html5QrCode = new Html5Qrcode('reader');
          }

          startWithCurrentCamera();
        })
        .catch(function (error) {
          showError(error);
        });
    }

    function pickPreferredCameraIndex(list) {
      var preferredIndex = 0;

      for (var i = 0; i < list.length; i++) {
        var label = (list[i].label || '').toLowerCase();
        if (
          label.indexOf('back') !== -1 ||
          label.indexOf('rear') !== -1 ||
          label.indexOf('environment') !== -1 ||
          label.indexOf('trás') !== -1 ||
          label.indexOf('tras') !== -1 ||
          label.indexOf('зад') !== -1
        ) {
          preferredIndex = i;
          break;
        }
      }

      return preferredIndex;
    }

    function startWithCurrentCamera() {
      scanBtn.style.display = 'none';
      readerEl.style.display = 'block';
      switchBtn.style.display = cameras.length > 1 ? 'inline-block' : 'none';
      switchBtn.disabled = cameras.length <= 1;
      readerEl.innerHTML = '';

      var selectedCamera = cameras[currentCameraIndex];
      cameraInfoEl.textContent = selectedCamera && selectedCamera.label
        ? 'Текущая камера: ' + selectedCamera.label
        : 'Текущая камера: #' + (currentCameraIndex + 1);

      var config = {
        fps: 10,
        qrbox: { width: 250, height: 180 },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.ITF,
          Html5QrcodeSupportedFormats.QR_CODE
        ],
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: false
        }
      };

      html5QrCode.start(
        selectedCamera.id,
        config,
        function (decodedText) {
          submitScan(decodedText);
        },
        function () {}
      ).then(function () {
        isScannerRunning = true;
        switchBtn.disabled = cameras.length <= 1;
      }).catch(function (error) {
        showError(error);
      });
    }

    function submitScan(text) {
      var code = String(text).trim();
      if (code.length < 3) {
        code = ('000' + code).slice(-3);
      }

      fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (html5QrCode) {
          html5QrCode.stop().catch(function () {});
        }

        isScannerRunning = false;
        readerEl.style.display = 'none';
        scanBtn.style.display = 'inline-block';
        switchBtn.style.display = 'none';
        cameraInfoEl.textContent = '';

        statusEl.innerHTML = '<div class="ok">Успешно отсканировано: <strong>' +
          data.last_scan + '</strong>. Код отправлен в админку.</div>';

        previewEl.innerHTML =
          '<img src="' + data.last_scan + '.jpg" alt="Карточка ' + data.last_scan + '"' +
          ' onerror="this.style.display=\'none\'; document.getElementById(\'preview\').innerHTML += \'<div class=&quot;muted&quot;>Картинка ' + data.last_scan + '.jpg не найдена.</div>\';">' +
          '<div class="muted">Превью карточки после сканирования</div>';
      })
      .catch(function (error) {
        showError(error);
      });
    }

    function showError(error) {
      console.error(error);
      isScannerRunning = false;
      readerEl.style.display = 'none';
      scanBtn.style.display = 'inline-block';
      switchBtn.style.display = 'none';
      cameraInfoEl.textContent = '';

      var message = 'Сканер не запустился.';
      if (error && (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError')) {
        message += ' Разрешите доступ к камере.';
      } else if (error && error.message) {
        message += ' ' + error.message;
      }

      statusEl.innerHTML = '<div class="error">' + message + '</div>';
    }
  </script>
</body>
</html>
